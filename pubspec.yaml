name: repotoire
description: Local-first PDF score library backed by a private GitHub repository.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0
  dio: ^5.7.0
  drift: ^2.21.0
  file_picker: ^8.1.7
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^9.2.2
  path: ^1.9.0
  path_provider: ^2.1.5
  pdfrx: ^1.0.94
  sqlite3_flutter_libs: ^0.5.27
  ulid: ^2.0.0
  url_launcher: ^6.3.1
  yaml: ^3.1.2
  yaml_edit: ^2.2.1

dev_dependencies:
  build_runner: ^2.4.11
  drift_dev: ^2.21.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
