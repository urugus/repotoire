version: 2

updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
      day: sunday
      time: "09:00"
      timezone: Asia/Tokyo
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dart

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
      time: "09:30"
      timezone: Asia/Tokyo
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
